<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本かぶれ検定</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style_top.css">

  <style>
    /* ============================================================
      タイトル画面専用のスタイル
      style.css の変数（--ink, --cream, --bg など）をそのまま使う
    ============================================================ */

    body {
      overflow: hidden;

    }
    .title-page-frame {
      width: 50em;
      height: 28em;
      position: relative;

    }

    /* ============================================================
      イラストエリア
      画面いっぱいに広がる背景として配置
    ============================================================ */
    .title-illust {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

    }
    .title-illust img {
      height: auto;
      width: 1000px;
      position: absolute;
      top: -6em;
      left: 17em;
    }

    /* ============================================================
      テキスト群（絶対配置でコマの上に重ねる）
    ============================================================ */

    .txt-title-ja {
      position: absolute;
      top: clamp(20px, 5%, 36px);
      left: clamp(20px, 5%, 36px);
      font-family: 'Kiwi Maru' serif;  
      line-height: 1.3;
      letter-spacing: 0.12em;
      color: var(--ink);
      font-size: 4em;
    }

    .txt-title-en {
      position: absolute;
      top: clamp(20px, 5%, 36px);
      right: clamp(20px, 5%, 36px);
      font-family: var(--font-sans);
      font-size: clamp(14px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.6;
      letter-spacing: 0.18em;
      color: var(--ink);
      text-align: right;
    }

    .title-btn-wrap {
      position: absolute;
      bottom: clamp(18px, 5%, 32px);
      right: clamp(20px, 5%, 36px);
    }

    .title-cta {
      display: inline-block;
      padding: 14px 32px;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-sans);
      font-size: clamp(14px, 1.8vw, 18px);
      font-weight: 700;
      letter-spacing: 0.14em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      /* style.css の sketchy-frame と同じフィルター */
      filter: url(#sketchy);
      transition: opacity 0.2s, transform 0.15s;
    }
    .title-cta:hover  { opacity: 0.82; }
    .title-cta:active { transform: scale(0.95); }

    /* ============================================================
      ポップアップアニメーション
      各要素に animation-delay をずらして順番に出現させる

      ① .page-frame   フレームがふわっと拡大して出る
      ② .txt-title-ja 左から滑り込む
      ③ .txt-title-en 右から滑り込む
      ④ .title-illust 下からふわっと上がる
      ⑤ .title-cta    最後にポンと出る（バウンス）
    ============================================================ */

    /* ── ① フレーム全体 ── */
    .title-page-frame {
      animation: frameIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes frameIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1);    }
    }

    /* ── ② 日本語タイトル ── */
    .txt-title-ja {
      animation: slideFromLeft 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) 0.2s both;
    }
    @keyframes slideFromLeft {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0);     }
    }

    /* ── ③ 英語タイトル ── */
    .txt-title-en {
      animation: slideFromRight 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) 0.32s both;
    }
    @keyframes slideFromRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0);    }
    }

    /* ── ④ イラスト ── */
    .title-illust {
      animation: illustUp 0.65s cubic-bezier(0.34, 1.3, 0.64, 1) 0.1s both;
    }
    @keyframes illustUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── ⑤ ボタン（最後にバウンスで出る） ── */
    .title-btn-wrap {
      animation: btnBounce 0.6s cubic-bezier(0.34, 1.7, 0.64, 1) 0.55s both;
    }
    @keyframes btnBounce {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1);   }
    }

    /* ============================================================
      レスポンシブ
    ============================================================ */
    @media (max-width: 600px) {
      body { overflow-y: auto; }

      .title-page-frame {
        width: 94vw;
        height: auto;
        min-height: 72vw;
        padding-bottom: 60px;
      }

      .txt-title-ja { font-size: 20px; }
      .txt-title-en { font-size: 12px; }

      .title-cta {
        font-size: 14px;
        padding: 11px 22px;
      }
    }
  </style>
</head>

<body>

<div class="content">

  <div class="screen active">
    <div class="page-frame sketchy-frame title-page-frame">

      <!-- ④ イラスト（一番奥に置く。テキストが前面に来る） -->
      <div class="title-illust">
        <img src="img/top.png" >
      </div>

      <p class="txt-title-ja">
        日本かぶれ<br>検定
      </p>

      <p class="txt-title-en">
        Japanese<br>Culture<br>Quiz
      </p>

      <div class="title-btn-wrap">

        <a href="quiz.html" class="title-cta">検定する</a>
      </div>

    </div>
  </div>
</div>
</body>
</html>
